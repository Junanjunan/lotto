services:
  web:
    build: .
    container_name: lotto-web
    ports:
      - "8645:8645"
    environment:
      LOTTO_DB_PATH: /app/data/lotto.db
      TZ: Asia/Seoul
      FASTAPI_ROOT_PATH: ${FASTAPI_ROOT_PATH:-}
      AD_PROVIDER: ${AD_PROVIDER:-none}
      AD_ENABLED: ${AD_ENABLED:-false}
      AD_TEST_MODE: ${AD_TEST_MODE:-false}
      AD_STICKY_MOBILE_ONLY: ${AD_STICKY_MOBILE_ONLY:-true}
      ADSENSE_CLIENT_ID: ${ADSENSE_CLIENT_ID:-}
      ADSENSE_SLOT_TOP: ${ADSENSE_SLOT_TOP:-}
      ADSENSE_SLOT_MID: ${ADSENSE_SLOT_MID:-}
      ADSENSE_SLOT_STICKY: ${ADSENSE_SLOT_STICKY:-}
      ADFIT_UNIT_TOP: ${ADFIT_UNIT_TOP:-}
      ADFIT_UNIT_MID: ${ADFIT_UNIT_MID:-}
      ADFIT_UNIT_STICKY: ${ADFIT_UNIT_STICKY:-}
      ADFIT_WIDTH_TOP: ${ADFIT_WIDTH_TOP:-728}
      ADFIT_HEIGHT_TOP: ${ADFIT_HEIGHT_TOP:-90}
      ADFIT_WIDTH_MID: ${ADFIT_WIDTH_MID:-728}
      ADFIT_HEIGHT_MID: ${ADFIT_HEIGHT_MID:-90}
      ADFIT_WIDTH_STICKY: ${ADFIT_WIDTH_STICKY:-320}
      ADFIT_HEIGHT_STICKY: ${ADFIT_HEIGHT_STICKY:-100}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8645
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8645/health').read()\""]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build: .
    container_name: lotto-scheduler
    environment:
      LOTTO_DB_PATH: /app/data/lotto.db
      TZ: Asia/Seoul
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: python -m app.scheduler
