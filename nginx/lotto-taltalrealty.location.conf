# Add this inside your existing server block for taltalrealty.store (HTTPS server)
# Ensure this block is placed above any generic / location block.

# optional: if someone hits /lotto exactly
location = /lotto {
    return 301 /lotto/;
}

location /lotto/ {
    rewrite ^/lotto/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:8645;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /lotto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
