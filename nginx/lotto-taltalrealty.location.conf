# Add this inside your existing server block for taltalrealty.store (HTTPS server)
# Ensure this block is placed above any generic / location block.

# ads.txt must be served from the domain root (예: https://taltalrealty.store/ads.txt).
# Set root to the directory that actually contains ads.txt on your web server.
location = /ads.txt {
    root /var/www/taltalrealty/store;
    default_type text/plain;
    charset UTF-8;
    try_files /ads.txt =404;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
}

# optional: if someone hits /lotto exactly
location = /lotto {
    return 301 /lotto/;
}

location /lotto/ {
    rewrite ^/lotto/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:8645;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /lotto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
