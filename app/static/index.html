<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto 전략 생성기</title>
  <style>
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #f7f8fc, #e3ecff 60%, #dff4ff);
      color: #1b2738;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 10px 0 18px;
    }
    .panel {
      background: rgba(255, 255, 255, 0.82);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 12px 30px rgba(45, 77, 130, 0.13);
      border: 1px solid rgba(76, 108, 255, 0.16);
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 12px;
      margin-bottom: 10px;
    }
    input, select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #9fb4db;
    }
    button {
      background: linear-gradient(90deg, #5b70ff, #2fb6ff);
      border: 0;
      color: white;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: #edf2ff;
      border: 1px solid #b5c4ff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
    }
    .muted {
      color: #5b6677;
      margin: 8px 0 0;
    }
    pre {
      background: #0b1020;
      color: #d7e2ff;
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th,
    td {
      border-bottom: 1px solid #d8e1f0;
      padding: 8px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      text-align: center;
      color: #26344b;
      background: #eef3ff;
    }
    .small {
      color: #5f6f8a;
      font-size: 12px;
    }
    .game-table th,
    .game-table td {
      text-align: center;
    }
    .game-table td:nth-child(2) {
      text-align: left;
    }
    .toggle-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 999px;
      background: #dbe6ff;
      color: #1f3e7a;
      border: 1px solid #b2c4ff;
      font-weight: 700;
      margin-right: 8px;
    }
    .game-row td:first-child {
      text-align: center;
    }
    .game-detail-row td {
      padding: 0;
    }
    .game-detail {
      display: none;
      padding: 12px 10px;
      background: #f6f8ff;
      border: 1px solid #d6e0fa;
      border-top: 0;
    }
    .rank-miss {
      color: #7a8799;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>로또 전략 게임 생성기</h1>
    <div class="panel">
      <p class="muted">지정한 회차까지 저장된 결과를 기준으로 과거 당첨 결과를 조회해 게임별 등수 분포를 바로 표시합니다.</p>
      <div>
        <label>
          게임 수
          <input id="gameCount" type="number" min="1" value="5" />
        </label>
        <label>
          전략
          <select id="strategy">
            <option value="low_overlap_random">low_overlap_random</option>
            <option value="uniform_random">uniform_random</option>
          </select>
        </label>
        <label>
          시드
          <input id="seed" type="number" placeholder="선택: 1.." />
        </label>
        <button id="runBtn">게임 생성</button>
        <button id="syncBtn">동기화 실행</button>
      </div>
      <p id="status" class="muted">준비됨</p>
    </div>

    <div class="panel">
      <h2>요약</h2>
      <div id="summary" class="chips"></div>
    </div>

    <div class="panel">
      <h2>최근 동기화 / 회차</h2>
      <pre id="draws">loading...</pre>
    </div>

    <div class="panel">
      <h2>생성 결과</h2>
      <div id="results"></div>
    </div>
  </div>

<script>
  var apiBase = '';
  (function () {
    var p = window.location.pathname;
    if (p === '/lotto' || p.indexOf('/lotto/') === 0) {
      apiBase = '/lotto';
    }
  }());

  var statusEl = document.getElementById('status');
  var drawsEl = document.getElementById('draws');
  var summaryEl = document.getElementById('summary');
  var resultEl = document.getElementById('results');

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  function fmtNums(nums) {
    return nums.join(', ');
  }

  function rankLabel(rank) {
    if (rank === 0) {
      return '미당첨';
    }
    return rank + '등';
  }

  function formatDistribution(dist) {
    var labels = [1, 2, 3, 4, 5];
    var out = [];
    for (var i = 0; i < labels.length; i++) {
      var rank = labels[i];
      var key = String(rank);
      var value = dist && Object.prototype.hasOwnProperty.call(dist, key) ? dist[key] : 0;
      out.push(key + '등:' + value);
    }
    return out.join(', ');
  }

  function renderGameDetailHits(hits) {
    if (!hits || hits.length === 0) {
      return '<p class="small" style="margin:0;">역대 회차 중 적중 이력이 없습니다.</p>';
    }
    var rows = '';
    for (var i = 0; i < hits.length; i++) {
      var h = hits[i];
      var isMiss = h.rank === 0;
      rows += '<tr>' +
        '<td>' + h.draw_no + '</td>' +
        '<td>' + h.match_count + '</td>' +
        '<td>' + (h.bonus_match ? 'O' : 'X') + '</td>' +
        '<td' + (isMiss ? ' class="rank-miss"' : '') + '>' + rankLabel(h.rank) + '</td>' +
        '</tr>';
    }
    return '<table class="game-table">' +
      '<thead><tr><th>회차</th><th>일치 개수</th><th>보너스 일치</th><th>등수</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>';
  }

  function fetchJson(url, options) {
    options = options || {};
    return fetch(apiBase + url, options).then(function (res) {
      if (!res.ok) {
        return res.text().then(function (body) {
          throw new Error(body || (res.status + ' ' + res.statusText));
        });
      }
      return res.json();
    });
  }

  function loadDraws() {
    fetchJson('/api/draws?start_no=1&end_no=1')
      .then(function (data) {
        drawsEl.textContent = JSON.stringify(data, null, 2);
      })
      .catch(function (err) {
        setStatus(err.message);
        drawsEl.textContent = '회차 조회 실패';
      });
  }

  function syncDraws() {
    setStatus('동기화 실행 중...');
    fetchJson('/api/sync', {
      method: 'POST'
    })
      .then(function (data) {
        setStatus('동기화 완료: status=' + data.status + ', inserted=' + data.inserted + ', updated=' + data.updated + ', skipped=' + data.skipped);
        loadDraws();
      })
      .catch(function (err) {
        setStatus('동기화 실패: ' + err.message);
      });
  }

  function runGames() {
    var gameCount = parseInt(document.getElementById('gameCount').value || '0', 10);
    var strategy = document.getElementById('strategy').value;
    var seedRaw = document.getElementById('seed').value;
    var body = { game_count: gameCount, strategy: strategy };
    if (seedRaw.trim()) {
      body.seed = parseInt(seedRaw, 10);
    }

    if (isNaN(gameCount) || gameCount < 1) {
      setStatus('게임 수는 1 이상이어야 합니다');
      return;
    }

    setStatus('생성 중...');
    fetchJson('/api/games', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
      .then(function (data) {
        var html = '';
        html += '<span class="chip">실행 ID: ' + data.run_id + '</span>';
        html += '<span class="chip">전략: ' + data.strategy + '</span>';
        html += '<span class="chip">게임 수: ' + data.game_count + '</span>';
        html += '<span class="chip">평가 기준 회차: ' + data.evaluated_until + '</span>';
        summaryEl.innerHTML = html;

        var rows = '';
        for (var i = 0; i < data.games.length; i++) {
          var g = data.games[i];
          var dist = formatDistribution(g.rank_distribution);
          var detailId = 'game-detail-' + i;
          var detailRows = renderGameDetailHits(g.hits);

          rows += '<tr>' +
            '<td><button class="toggle-btn game-toggle" data-target="' + detailId + '" aria-expanded="false">▶</button></td>' +
            '<td>' + (g.game_index + 1) + '</td>' +
            '<td>' + fmtNums(g.numbers) + '</td>' +
            '<td>' + dist + '</td>' +
            '<td>' + g.total_hits + '</td>' +
            '</tr>';
          rows += '<tr id="' + detailId + '" class="game-detail-row" style="display:none;">' +
            '<td colspan="5">' +
            '<div class="game-detail">' + detailRows + '</div>' +
            '</td>' +
            '</tr>';
        }

        resultEl.innerHTML = '<table class="game-table"><thead><tr><th></th><th>#</th><th>번호</th><th>등수 분포</th><th>누적 1~5등</th></tr></thead><tbody>' + rows + '</tbody></table>';

        var toggles = document.getElementsByClassName('game-toggle');
        for (var t = 0; t < toggles.length; t++) {
          toggles[t].addEventListener('click', function () {
            var targetId = this.getAttribute('data-target');
            var row = document.getElementById(targetId);
            if (!row) {
              return;
            }
            var panel = row.querySelector('.game-detail');
            var expanded = this.getAttribute('aria-expanded') === 'true';

            if (expanded) {
              row.style.display = 'none';
              panel.style.display = 'none';
              this.setAttribute('aria-expanded', 'false');
              this.textContent = '▶';
            } else {
              row.style.display = 'table-row';
              panel.style.display = 'block';
              this.setAttribute('aria-expanded', 'true');
              this.textContent = '▼';
            }
          });
        }
        setStatus('완료');
      })
      .catch(function (err) {
        setStatus('게임 생성 실패: ' + err.message);
        resultEl.textContent = '';
      });
  }

  document.getElementById('runBtn').addEventListener('click', runGames);
  document.getElementById('syncBtn').addEventListener('click', syncDraws);

  loadDraws();
</script>
</body>
</html>
